name: Deploy Vault

on:
  push:
    branches:
      - master
    paths:
      - "app/**"
      - "components/**"
      - "db/**"
      - "lib/**"
      - "server/**"
      - "types/**"
      - "public/**"
      - "scripts/**"
      - "auth.ts"
      - "Dockerfile"
      - "docker-compose.production.yml"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "drizzle.config.ts"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: vault-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Vault on mini-PC
    runs-on: [self-hosted, minipc, vault, prod]
    environment: production
    timeout-minutes: 30

    steps:
      - name: Check deployment script
        run: test -x /opt/apps/vault/repo/scripts/deploy.sh

      - name: Deploy Vault
        run: /opt/apps/vault/repo/scripts/deploy.sh