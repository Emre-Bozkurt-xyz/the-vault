name: Deploy Vault

on:
  push:
    branches:
      - master
    paths:
      - "app/**"
      - "components/**"
      - "db/**"
      - "lib/**"
      - "server/**"
      - "types/**"
      - "public/**"
      - "scripts/**"
      - "auth.ts"
      - "Dockerfile"
      - "Dockerfile.collab"
      - "docker-compose.production.yml"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "drizzle.config.ts"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: vault-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Vault on mini-PC
    runs-on: [self-hosted, minipc, vault, prod]
    environment: production
    timeout-minutes: 30

    steps:
      - name: Bootstrap server repo
        run: |
          set -euo pipefail

          APP_DIR="/opt/apps/vault/repo"

          echo "[workflow] Bootstrapping server repo..."
          cd "$APP_DIR"

          echo "[workflow] Fetching latest master..."
          git fetch origin master
          git reset --hard origin/master

          echo "[workflow] Ensuring deploy script is runnable..."
          chmod +x scripts/deploy.sh
          test -f scripts/deploy.sh

          echo "[workflow] Server repo ready."
          ls -la scripts/deploy.sh

      - name: Deploy Vault
        run: bash /opt/apps/vault/repo/scripts/deploy.sh