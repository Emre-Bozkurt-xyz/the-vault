services:
  vault-web:
    build:
      context: .
      target: runner
    container_name: vault-web
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    depends_on:
      vault-postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  vault-migrate:
    build:
      context: .
      target: builder
    container_name: vault-migrate
    env_file:
      - path: .env.production
        required: false
    depends_on:
      vault-postgres:
        condition: service_healthy
    command: npm run db:migrate
    profiles:
      - migrate

  vault-postgres:
    image: postgres:16
    container_name: vault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vault
    volumes:
      - vault_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault -d vault"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vault_postgres_data:
