name: vault

services:
  web:
    build:
      context: .
      target: runner
    container_name: vault-web
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    ports:
      # Bind locally on the mini-PC. Expose publicly only through FRP + VPC Caddy.
      - "127.0.0.1:18210:3000"
    depends_on:
      postgres:
        condition: service_healthy
      collab:
        condition: service_started
    networks:
      - vault_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  migrate:
    build:
      context: .
      target: builder
    container_name: vault-migrate
    restart: "no"
    env_file:
      - path: .env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "db:migrate"]
    networks:
      - vault_internal
    profiles:
      - migrate

  collab:
    build:
      context: .
      dockerfile: Dockerfile.collab
    container_name: vault-collab
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      COLLAB_PORT: 1234
    ports:
      - "127.0.0.1:18211:1234"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vault_internal

  postgres:
    image: postgres:16-alpine
    container_name: vault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vault
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vault_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault -d vault"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vault_internal

volumes:
  vault_postgres:

networks:
  vault_internal:
    driver: bridge
